services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "max_connections=20"]
    environment:
      POSTGRES_USER: acme
      POSTGRES_PASSWORD: acme
      POSTGRES_DB: acme_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acme -d acme_test"]
      interval: 5s
      timeout: 5s
      retries: 12
